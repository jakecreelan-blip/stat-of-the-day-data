name: Update Stat of the Day data

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pybaseball pandas

      - name: Run stat bot
        run: python mlb_stat_bot.py

      - name: Commit updated data
        run: |
          git config user.name "stat-of-the-day-bot"
          git config user.email "actions@users.noreply.github.com"
          git add stats_data.json
          git diff --staged --quiet && echo "No changes" || git commit -m "Daily stat update $(date +%Y-%m-%d)"
          git push
