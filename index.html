<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stat of the Day</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #ffffff;
    --paper: #f4f8fd;
    --ink: #16243f;
    --ink-soft: #5d6e8c;
    --blue: #2f63e3;
    --blue-deep: #14306b;
    --blue-soft: #cfe0ff;
    --rule: #dfe7f7;
  }

  * { box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Source Serif 4', serif;
    margin: 0;
    padding: 1.5rem;
  }

  .sotd {
    max-width: 640px;
    margin: 0 auto;
    border: 1px solid var(--rule);
    border-radius: 14px;
    padding: 1.5rem;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }
  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
    text-transform: uppercase;
  }
  .lang-toggle {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 999px;
    padding: 0.35rem 0.8rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--blue);
    cursor: pointer;
    letter-spacing: 0.05em;
  }
  .lang-toggle:hover { border-color: var(--blue); }

  .board {
    background: linear-gradient(135deg, var(--blue-deep) 0%, var(--blue) 100%);
    border-radius: 10px;
    padding: 1.4rem;
    margin-bottom: 1rem;
  }
  .board .cat {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--blue-soft);
    opacity: 0.9;
  }
  .board h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: #ffffff;
    margin: 0.2rem 0 0.6rem;
    line-height: 1.25;
  }
  .board-value {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 2.4rem;
    color: #ffffff;
    letter-spacing: 0.02em;
    line-height: 1;
  }

  .card {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: 1rem 1.1rem;
    margin-bottom: 0.85rem;
  }
  .card h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 0.45rem;
  }
  .card p { margin: 0; line-height: 1.55; font-size: 0.95rem; }

  .live-card { border-color: var(--blue); background: var(--blue-soft); }
  .live-row { display: flex; justify-content: space-between; gap: 1rem; padding: 0.5rem 0; }
  .live-row + .live-row { border-top: 1px dashed rgba(47,99,227,0.25); }
  .live-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--blue-deep);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.75;
  }
  .live-name { font-family: 'Space Grotesk', sans-serif; font-weight: 700; color: var(--blue-deep); }
  .live-value { font-family: 'Space Mono', monospace; font-weight: 700; color: var(--blue); font-size: 1.05rem; }

  .footer {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    color: var(--ink-soft);
    text-align: center;
    margin-top: 0.5rem;
  }
</style>
</head>
<body>
  <div class="sotd" id="app">Loading...</div>

<script>
const DATA_URL = "https://raw.githubusercontent.com/jakecreelan-blip/stat-of-the-day-data/refs/heads/main/stats_data.json";

const SAMPLE_DATA = {
  season: new Date().getFullYear(),
  updated: "sample data \u2014 connect your bot's JSON",
  stats: {
    xwoba: { leader: { player: "Yordan Alvarez", value: 0.489 }, coldest: { player: "\u2014", value: 0.253 } },
    woba: { leader: { player: "Aaron Judge", value: 0.43 }, coldest: { player: "\u2014", value: 0.25 } },
    xba: { leader: { player: "Luis Arraez", value: 0.34 }, coldest: { player: "\u2014", value: 0.21 } },
    xslg: { leader: { player: "Shohei Ohtani", value: 0.61 }, coldest: { player: "\u2014", value: 0.32 } },
    barrel: { leader: { player: "James Wood", value: 25.3 }, coldest: { player: "\u2014", value: 0.0 } },
    hardhit: { leader: { player: "Oneil Cruz", value: 59.2 }, coldest: { player: "\u2014", value: 8.5 } },
    avgev: { leader: { player: "Oneil Cruz", value: 95.1 }, coldest: { player: "\u2014", value: 84.2 } },
    maxev: { leader: { player: "Oneil Cruz", value: 122.9 }, coldest: { player: "\u2014", value: 98.4 } },
    sweetspot: { leader: { player: "Luis Arraez", value: 42.1 }, coldest: { player: "\u2014", value: 22.6 } },
    avgdist: { leader: { player: "Kyle Schwarber", value: 210 }, coldest: { player: "\u2014", value: 140 } },
  },
};

const STATS = [
  {
    id: "xwoba", abbr: "xwOBA",
    category: { en: "Expected Stats", es: "Estad\u00edsticas Esperadas" },
    name: { en: "Expected Weighted On-Base Average", es: "wOBA Esperado" },
    def: {
      en: "Uses exit velocity and launch angle on every batted ball to estimate the wOBA a hitter 'should' have produced, stripping out luck and defense.",
      es: "Usa la velocidad de salida y el \u00e1ngulo de lanzamiento de cada pelota bateada para estimar el wOBA que un bateador 'deber\u00eda' haber producido, sin la suerte ni la defensa rival.",
    },
    why: {
      en: "If a player's actual wOBA is much lower than their xwOBA, they've been hitting the ball hard but running into bad luck \u2014 a strong sign they're about to get hot.",
      es: "Si el wOBA real de un jugador es mucho menor que su xwOBA, ha estado golpeando la pelota fuerte pero con mala suerte: una se\u00f1al de que podr\u00eda estar por explotar.",
    },
    benchmark: {
      en: "Benchmark: since Statcast began tracking expected stats in 2015, single-season xwOBA marks above .450 are exceptionally rare \u2014 true MVP territory.",
      es: "Referencia: desde que Statcast comenz\u00f3 a medir estas estad\u00edsticas en 2015, marcas de xwOBA por encima de .450 en una temporada son excepcionalmente raras: territorio de MVP.",
    },
    format: (v) => v.toFixed(3),
  },
  {
    id: "woba", abbr: "wOBA",
    category: { en: "Hitting", es: "Bateo" },
    name: { en: "Weighted On-Base Average", es: "Promedio de Embasarse Ponderado" },
    def: {
      en: "The real-outcomes version of wOBA \u2014 combines every way a hitter reaches base (walks, singles, doubles, homers) weighted by run value, based on what actually happened.",
      es: "La versi\u00f3n de resultados reales del wOBA: combina todas las formas en que un bateador llega a base (base por bolas, sencillo, doble, jonr\u00f3n) seg\u00fan su valor real en carreras, basado en lo que realmente ocurri\u00f3.",
    },
    why: {
      en: "Comparing wOBA to xwOBA tells a story: much higher than xwOBA means lucky bounces; much lower means hitting the ball well with bad luck.",
      es: "Comparar wOBA con xwOBA cuenta una historia: si es mucho mayor, ha tenido suerte; si es mucho menor, ha bateado bien pero con mala suerte.",
    },
    benchmark: {
      en: "All-time benchmark: Babe Ruth's career wOBA is estimated near .474 \u2014 a century-old mark nobody has touched since.",
      es: "Referencia hist\u00f3rica: se estima que el wOBA de carrera de Babe Ruth es cercano a .474, una marca de hace un siglo que nadie ha igualado.",
    },
    format: (v) => v.toFixed(3),
  },
  {
    id: "xba", abbr: "xBA",
    category: { en: "Expected Stats", es: "Estad\u00edsticas Esperadas" },
    name: { en: "Expected Batting Average", es: "Promedio de Bateo Esperado" },
    def: {
      en: "Like xwOBA, but for batting average \u2014 estimates how often a player's batted balls 'should' become hits based on exit velocity and launch angle alone.",
      es: "Igual que xwOBA, pero para el promedio de bateo: estima qu\u00e9 tan a menudo las pelotas bateadas 'deber\u00edan' convertirse en hits seg\u00fan solo la velocidad y el \u00e1ngulo.",
    },
    why: {
      en: "If a player's real batting average is well below their xBA, they've been hitting the ball well but having bad luck \u2014 a sign they could be about to get hot.",
      es: "Si el promedio real de un jugador est\u00e1 muy por debajo de su xBA, ha estado bateando bien pero con mala suerte: una se\u00f1al de que podr\u00eda estar por calentarse.",
    },
    benchmark: {
      en: "Benchmark: single-season xBA marks above .330 are extremely rare and typically belong to batting-title contenders.",
      es: "Referencia: marcas de xBA de .330 o m\u00e1s en una temporada son extremadamente raras y suelen pertenecer a candidatos al t\u00edtulo de bateo.",
    },
    format: (v) => v.toFixed(3),
  },
  {
    id: "xslg", abbr: "xSLG",
    category: { en: "Expected Stats", es: "Estad\u00edsticas Esperadas" },
    name: { en: "Expected Slugging Percentage", es: "Slugging Esperado" },
    def: {
      en: "Estimates slugging percentage based on contact quality (exit velocity and launch angle) rather than actual outcomes.",
      es: "Estima el porcentaje de slugging seg\u00fan la calidad de contacto (velocidad y \u00e1ngulo), en lugar de los resultados reales.",
    },
    why: {
      en: "A high xSLG means a player is consistently hitting the ball hard at angles that produce extra bases, even if some of those balls have been caught.",
      es: "Un xSLG alto significa que un jugador est\u00e1 golpeando la pelota fuerte y a \u00e1ngulos que producen extra-bases de forma constante, aunque algunas hayan sido atrapadas.",
    },
    benchmark: {
      en: "Benchmark: single-season xSLG marks above .600 are MVP-tier \u2014 territory reached by only a handful of the game's best power hitters each year.",
      es: "Referencia: marcas de xSLG de .600 o m\u00e1s en una temporada son de nivel MVP, alcanzadas solo por unos pocos de los mejores bateadores de poder cada a\u00f1o.",
    },
    format: (v) => v.toFixed(3),
  },
  {
    id: "barrel", abbr: "Barrel%",
    category: { en: "Power", es: "Poder" },
    name: { en: "Barrel Rate", es: "Tasa de Barrels" },
    def: {
      en: "The percentage of batted balls hit with the ideal combination of exit velocity and launch angle to produce the best results \u2014 basically, 'perfectly struck' balls.",
      es: "El porcentaje de pelotas bateadas con la combinaci\u00f3n ideal de velocidad y \u00e1ngulo para producir los mejores resultados: pelotas 'golpeadas a la perfecci\u00f3n'.",
    },
    why: {
      en: "Barrels almost always go for extra bases. A barrel rate over 10% is excellent \u2014 roughly one in ten swings doing serious damage.",
      es: "Los 'barrels' casi siempre se convierten en hits de extra-bases. M\u00e1s del 10% es excelente: aproximadamente uno de cada diez swings hace da\u00f1o serio.",
    },
    benchmark: {
      en: "Benchmark: in the Statcast era, the highest single-season barrel rates have approached or topped 30% \u2014 a tier reached by elite sluggers in their best seasons.",
      es: "Referencia: en la era Statcast, las mejores tasas de barrels en una temporada han llegado o superado el 30%, un nivel alcanzado por bateadores de \u00e9lite en sus mejores a\u00f1os.",
    },
    format: (v) => v.toFixed(1) + "%",
  },
  {
    id: "hardhit", abbr: "Hard-Hit%",
    category: { en: "Contact Quality", es: "Calidad de Contacto" },
    name: { en: "Hard-Hit Rate", es: "Tasa de Contacto Fuerte" },
    def: {
      en: "The share of batted balls hit at 95 mph or higher off the bat \u2014 a broader measure of contact quality than barrels.",
      es: "El porcentaje de pelotas bateadas a 95 mph o m\u00e1s: una medida m\u00e1s amplia de la calidad de contacto que los barrels.",
    },
    why: {
      en: "League average sits around 35-40%. A hitter consistently above 50% is squaring up the ball even when results haven't caught up yet.",
      es: "El promedio de la liga est\u00e1 cerca del 35-40%. Un bateador por encima del 50% de forma constante est\u00e1 conectando bien, aunque los resultados a\u00fan no lo reflejen.",
    },
    benchmark: {
      en: "Benchmark: Giancarlo Stanton has posted some of the highest hard-hit rates ever tracked, regularly clearing 60% in his best seasons.",
      es: "Referencia: Giancarlo Stanton ha registrado algunas de las tasas de contacto fuerte m\u00e1s altas jam\u00e1s medidas, superando regularmente el 60% en sus mejores temporadas.",
    },
    format: (v) => v.toFixed(1) + "%",
  },
  {
    id: "avgev", abbr: "Avg EV",
    category: { en: "Contact Quality", es: "Calidad de Contacto" },
    name: { en: "Average Exit Velocity", es: "Velocidad de Salida Promedio" },
    def: {
      en: "The average speed, in miles per hour, that the ball comes off a hitter's bat across all batted balls in play.",
      es: "La velocidad promedio, en millas por hora, con la que la pelota sale del bate en todas las pelotas puestas en juego.",
    },
    why: {
      en: "League average sits around 88-89 mph. Anything above 91 mph signals real, consistent power \u2014 one of the most stable 'true skill' indicators in baseball.",
      es: "El promedio de la liga est\u00e1 cerca de 88-89 mph. M\u00e1s de 91 mph indica poder real y consistente: uno de los indicadores de 'habilidad real' m\u00e1s estables del b\u00e9isbol.",
    },
    benchmark: {
      en: "Benchmark: season-long average exit velocity leaders tend to sit in the 93-95 mph range \u2014 among the very hardest-hitting players in the league.",
      es: "Referencia: los l\u00edderes de velocidad de salida promedio en una temporada suelen estar entre 93-95 mph, entre los bateadores que golpean m\u00e1s duro de la liga.",
    },
    format: (v) => v.toFixed(1) + " mph",
  },
  {
    id: "maxev", abbr: "Max EV",
    category: { en: "Power", es: "Poder" },
    name: { en: "Max Exit Velocity", es: "Velocidad de Salida M\u00e1xima" },
    def: {
      en: "The single hardest-hit ball (in mph) by this player so far this season \u2014 their personal 'top speed' off the bat.",
      es: "La pelota m\u00e1s dura bateada (en mph) por este jugador en la temporada hasta ahora: su 'velocidad m\u00e1xima' personal.",
    },
    why: {
      en: "This is pure top-end power on one swing. Anything over 115 mph is among the hardest-hit balls of the entire season, league-wide.",
      es: "Esto es poder puro en un solo swing. M\u00e1s de 115 mph est\u00e1 entre las pelotas m\u00e1s duras bateadas de toda la temporada, en toda la liga.",
    },
    benchmark: {
      en: "All-time (Statcast era) benchmark: Oneil Cruz hit a 122.9 mph home run \u2014 the hardest-hit ball ever recorded by Statcast.",
      es: "Referencia hist\u00f3rica (era Statcast): Oneil Cruz bate\u00f3 un jonr\u00f3n a 122.9 mph, la pelota m\u00e1s dura jam\u00e1s registrada por Statcast.",
    },
    format: (v) => v.toFixed(1) + " mph",
  },
  {
    id: "sweetspot", abbr: "Sweet Spot%",
    category: { en: "Contact Quality", es: "Calidad de Contacto" },
    name: { en: "Sweet-Spot Rate", es: "Tasa de 'Sweet Spot'" },
    def: {
      en: "The percentage of batted balls hit with a launch angle between 8 and 32 degrees \u2014 the range most likely to produce hits and extra bases.",
      es: "El porcentaje de pelotas bateadas con un \u00e1ngulo de lanzamiento entre 8 y 32 grados: el rango con m\u00e1s probabilidad de producir hits y extra-bases.",
    },
    why: {
      en: "League average is around 33%. A high sweet-spot rate combined with hard contact is the recipe for a great hitter.",
      es: "El promedio de la liga es cerca del 33%. Una alta tasa de 'sweet spot' combinada con contacto fuerte es la receta de un gran bateador.",
    },
    benchmark: {
      en: "Benchmark: the best single-season sweet-spot rates have approached 45% \u2014 hitters who consistently find that window are extremely difficult to pitch to.",
      es: "Referencia: las mejores tasas de 'sweet spot' en una temporada han llegado cerca del 45%; esos bateadores son muy dif\u00edciles de enfrentar.",
    },
    format: (v) => v.toFixed(1) + "%",
  },
  {
    id: "avgdist", abbr: "Avg Dist",
    category: { en: "Power", es: "Poder" },
    name: { en: "Average Batted Ball Distance", es: "Distancia Promedio de Bateo" },
    def: {
      en: "The average distance, in feet, that a player's batted balls travel \u2014 across all types of contact, not just home runs.",
      es: "La distancia promedio, en pies, que recorren las pelotas bateadas por un jugador, contando todo tipo de contacto, no solo jonrones.",
    },
    why: {
      en: "This blends power and launch angle into one number. Big, sustained distance usually means a hitter is squaring up the ball and lifting it.",
      es: "Esto combina poder y \u00e1ngulo de lanzamiento en un solo n\u00famero. Distancias grandes y sostenidas suelen significar buen contacto y elevaci\u00f3n de la pelota.",
    },
    benchmark: {
      en: "Benchmark: the longest home runs of the Statcast era have traveled 500+ feet, but a season-long average over 200 feet already places a hitter among the league's most dangerous.",
      es: "Referencia: los jonrones m\u00e1s largos de la era Statcast han recorrido m\u00e1s de 500 pies, pero un promedio de toda la temporada por encima de 200 pies ya ubica a un bateador entre los m\u00e1s peligrosos de la liga.",
    },
    format: (v) => v.toFixed(0) + " ft",
  },
];

function dayOfYear() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  return Math.floor((now - start) / 86400000);
}

let lang = "en";
let appData = null;
let loadState = "loading";

function t(obj) { return obj[lang]; }

function render() {
  const stat = STATS[dayOfYear() % STATS.length];
  const live = appData && appData.stats ? appData.stats[stat.id] : null;

  let liveHtml;
  if (live && live.leader) {
    liveHtml = `
      <div class="live-row">
        <div>
          <div class="live-label">${lang === "en" ? "Leader" : "L\u00edder"}</div>
          <div class="live-name">${live.leader.player}</div>
        </div>
        <div class="live-value">${stat.format(live.leader.value)}</div>
      </div>
      <div class="live-row">
        <div>
          <div class="live-label">${lang === "en" ? "Season low (qualified)" : "M\u00e1s bajo de la temporada (calificados)"}</div>
          <div class="live-name">${live.coldest.player}</div>
        </div>
        <div class="live-value">${stat.format(live.coldest.value)}</div>
      </div>`;
  } else {
    liveHtml = `<p>${lang === "en" ? "Loading today's numbers..." : "Cargando los n\u00fameros de hoy..."}</p>`;
  }

  let footerText = "";
  if (loadState === "live") {
    footerText = (lang === "en" ? "Updated " : "Actualizado ") + appData.updated;
  } else if (loadState === "sample") {
    footerText = lang === "en"
      ? "Showing sample data \u2014 check your data file"
      : "Mostrando datos de muestra \u2014 revisa tu archivo de datos";
  } else {
    footerText = lang === "en" ? "Loading..." : "Cargando...";
  }

  document.getElementById("app").innerHTML = `
    <div class="topbar">
      <span class="eyebrow">${lang === "en" ? "Stat of the Day" : "Estad\u00edstica del D\u00eda"}</span>
      <button class="lang-toggle" id="lang-btn">${lang === "en" ? "ESPA\u00d1OL" : "ENGLISH"}</button>
    </div>

    <div class="board">
      <div class="cat">${t(stat.category)}</div>
      <h1>${t(stat.name)} \u00b7 ${stat.abbr}</h1>
      <div class="board-value">${live && live.leader ? stat.format(live.leader.value) : "\u2014"}</div>
    </div>

    <div class="card live-card">
      <h2>${lang === "en" ? (appData ? appData.season + " season leaderboard" : "Season leaderboard") : "Tabla de l\u00edderes" + (appData ? " \u2014 temporada " + appData.season : "")}</h2>
      ${liveHtml}
    </div>

    <div class="card">
      <h2>${lang === "en" ? "What it means" : "Qu\u00e9 significa"}</h2>
      <p>${t(stat.def)}</p>
    </div>

    <div class="card">
      <h2>${lang === "en" ? "Why it matters" : "Por qu\u00e9 importa"}</h2>
      <p>${t(stat.why)}</p>
    </div>

    <div class="card">
      <h2>${lang === "en" ? "All-time benchmark" : "Referencia hist\u00f3rica"}</h2>
      <p>${t(stat.benchmark)}</p>
    </div>

    <div class="footer">${footerText}</div>
  `;

  document.getElementById("lang-btn").addEventListener("click", () => {
    lang = lang === "en" ? "es" : "en";
    render();
  });
}

render();

fetch(DATA_URL + "?t=" + Date.now(), { cache: "no-store" })
  .then((res) => {
    if (!res.ok) throw new Error("bad response");
    return res.json();
  })
  .then((json) => {
    appData = json;
    loadState = "live";
    render();
  })
  .catch(() => {
    appData = SAMPLE_DATA;
    loadState = "sample";
    render();
  });
</script>
</body>
</html>
