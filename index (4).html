<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stat of the Day</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #ffffff;
    --paper: #f4f8fd;
    --ink: #16243f;
    --ink-soft: #5d6e8c;
    --blue: #2f63e3;
    --blue-deep: #14306b;
    --blue-soft: #cfe0ff;
    --rule: #dfe7f7;
  }

  * { box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Source Serif 4', serif;
    margin: 0;
    padding: 1.5rem;
  }

  .sotd {
    max-width: 640px;
    margin: 0 auto;
    border: 1px solid var(--rule);
    border-radius: 14px;
    padding: 1.5rem;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }
  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
    text-transform: uppercase;
  }
  .lang-toggle {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 999px;
    padding: 0.35rem 0.8rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--blue);
    cursor: pointer;
    letter-spacing: 0.05em;
  }
  .lang-toggle:hover { border-color: var(--blue); }

  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .tab-btn {
    flex: 1 1 calc(50% - 0.25rem);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    padding: 0.5rem 0.6rem;
    border-radius: 8px;
    border: 1px solid var(--rule);
    background: var(--paper);
    color: var(--ink-soft);
    cursor: pointer;
    text-align: center;
  }
  .tab-btn.active {
    background: var(--blue);
    color: #ffffff;
    border-color: var(--blue);
  }

  .board {
    background: linear-gradient(135deg, var(--blue-deep) 0%, var(--blue) 100%);
    border-radius: 10px;
    padding: 1.4rem;
    margin-bottom: 1rem;
  }
  .board .cat {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--blue-soft);
    opacity: 0.9;
  }
  .board h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: #ffffff;
    margin: 0.2rem 0 0.6rem;
    line-height: 1.25;
  }
  .board-value {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 2.4rem;
    color: #ffffff;
    letter-spacing: 0.02em;
    line-height: 1;
  }

  .card {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: 1rem 1.1rem;
    margin-bottom: 0.85rem;
  }
  .card h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 0.45rem;
  }
  .card p { margin: 0; line-height: 1.55; font-size: 0.95rem; }
  .card p + p { margin-top: 0.6rem; }

  .live-card { border-color: var(--blue); background: var(--blue-soft); }
  .live-row { display: flex; justify-content: space-between; gap: 1rem; padding: 0.5rem 0; }
  .live-row + .live-row { border-top: 1px dashed rgba(47,99,227,0.25); }
  .live-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--blue-deep);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.75;
  }
  .live-name { font-family: 'Space Grotesk', sans-serif; font-weight: 700; color: var(--blue-deep); }
  .live-value { font-family: 'Space Mono', monospace; font-weight: 700; color: var(--blue); font-size: 1.05rem; }

  /* Chart */
  .chart { margin-top: 0.9rem; padding-top: 0.9rem; border-top: 1px dashed rgba(47,99,227,0.25); }
  .chart-track {
    position: relative;
    height: 6px;
    background: rgba(47,99,227,0.18);
    border-radius: 999px;
    margin: 0 6px;
  }
  .chart-marker {
    position: absolute;
    top: 50%;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid #ffffff;
    transform: translate(-50%, -50%);
  }
  .chart-marker-edge1 { background: #9fb6e0; }
  .chart-marker-avg { background: var(--blue); }
  .chart-marker-edge2 { background: var(--blue-deep); }
  .chart-labels {
    position: relative;
    margin-top: 1.6rem;
    height: 2.4rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    color: var(--blue-deep);
  }
  .chart-label {
    position: absolute;
    top: 0;
    transform: translateX(-50%);
    text-align: center;
    line-height: 1.4;
    white-space: nowrap;
  }
  .chart-label.first { transform: translateX(0); text-align: left; }
  .chart-label.last { transform: translateX(-100%); text-align: right; }
  .chart-label .lbl { display: block; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.06em; }
  .chart-label .val { display: block; font-weight: 700; font-size: 0.78rem; }

  /* Trend */
  .trend-svg { display: block; width: 100%; }
  .trend-labels {
    display: flex;
    justify-content: space-between;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--ink-soft);
    margin-top: 0.3rem;
  }

  .footer {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    color: var(--ink-soft);
    text-align: center;
    margin-top: 0.5rem;
  }
</style>
</head>

    limits: { en: "A very low foul rate can sometimes mean a player avoids contact and physical defense entirely, not just that they're disciplined.", es: "Una tasa de faltas muy baja a veces puede significar que un jugador evita por completo el contacto y la defensa f\u00edsica, no solo que sea disciplinado." },
    benchmark: { en: "Benchmark: starters who average under 2 fouls per game while playing heavy minutes are doing something right defensively without compromising availability.", es: "Referencia: los titulares que promedian menos de 2 faltas por partido jugando muchos minutos est\u00e1n haciendo algo bien en defensa sin comprometer su disponibilidad." },
    format: (v) => v.toFixed(1),
  },
];

const TABS = {
  hitting: { label: { en: "Hitting", es: "Bateo" }, stats: STATS_HITTING, historyBase: "history/", dataKey: "hitting" },
  pitching: { label: { en: "Pitching", es: "Pitcheo" }, stats: STATS_PITCHING, historyBase: "history/", dataKey: "pitching" },
  nba_offense: { label: { en: "NBA Offense", es: "NBA Ataque" }, stats: STATS_NBA_OFFENSE, historyBase: "nba_history/", dataKey: "offense" },
  nba_defense: { label: { en: "NBA Defense", es: "NBA Defensa" }, stats: STATS_NBA_DEFENSE, historyBase: "nba_history/", dataKey: "defense" },
};

function dayOfYear() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  return Math.floor((now - start) / 86400000);
}

let lang = "en";
let activeTab = "hitting";
let appData = null;
let nbaData = null;
let loadState = "loading";
let nbaLoadState = "loading";
let trendData = null;
let trendLoading = false;

function t(obj) { return obj[lang]; }

function renderChart(stat, live) {
  if (!live || !live.leader || live.average === undefined) return "";
  const leaderVal = live.leader.value;
  const otherVal = live.coldest.value;
  const lo = Math.min(leaderVal, otherVal);
  const hi = Math.max(leaderVal, otherVal);
  const range = hi - lo;
  const avgPct = range !== 0 ? Math.min(100, Math.max(0, ((live.average - lo) / range) * 100)) : 50;
  const leaderAtLo = leaderVal <= otherVal;
  const leaderPct = leaderAtLo ? 0 : 100;

  const leaderLbl = lang === "en" ? "LEADER" : "L\u00cdDER";
  const avgLbl = lang === "en" ? "LEAGUE AVG" : "PROMEDIO LIGA";
  const otherLbl = OTHER_LABEL[lang].toUpperCase();

  const edge1IsLeader = leaderPct === 0;
  const label0 = edge1IsLeader ? leaderLbl : otherLbl;
  const value0 = edge1IsLeader ? leaderVal : otherVal;
  const label100 = edge1IsLeader ? otherLbl : leaderLbl;
  const value100 = edge1IsLeader ? otherVal : leaderVal;

  return `
    <div class="chart">
      <div class="chart-track">
        <div class="chart-marker chart-marker-edge1" style="left:0%"></div>
        <div class="chart-marker chart-marker-avg" style="left:${avgPct}%"></div>
        <div class="chart-marker chart-marker-edge2" style="left:100%"></div>
      </div>
      <div class="chart-labels">
        <div class="chart-label first" style="left:0%">
          <span class="lbl">${label0}</span>
          <span class="val">${stat.format(value0)}</span>
        </div>
        <div class="chart-label" style="left:${avgPct}%">
          <span class="lbl">${avgLbl}</span>
          <span class="val">${stat.format(live.average)}</span>
        </div>
        <div class="chart-label last" style="left:100%">
          <span class="lbl">${label100}</span>
          <span class="val">${stat.format(value100)}</span>
        </div>
      </div>
    </div>
  `;
}

function renderTrend(stat) {
  let body;
  if (trendLoading) {
    body = `<p>${lang === "en" ? "Loading trend..." : "Cargando tendencia..."}</p>`;
  } else if (!trendData || trendData.length < 2) {
    const dayCount = trendData ? trendData.length : 1;
    body = `<p>${
      lang === "en"
        ? `The trend line builds as more days are recorded. Archive currently has ${dayCount} day(s) \u2014 check back soon!`
        : `La l\u00ednea de tendencia se construye con m\u00e1s d\u00edas registrados. El archivo tiene ${dayCount} d\u00eda(s) por ahora: \u00a1vuelve pronto!`
    }</p>`;
  } else {
    const W = 300, H = 70, pad = 12;
    const values = trendData.map((p) => p.value);
    const min = Math.min(...values);
    const max = Math.max(...values);
    const range = (max - min) || 1;
    const stepX = trendData.length > 1 ? (W - 2 * pad) / (trendData.length - 1) : 0;
    const coords = trendData.map((p, i) => {
      const x = pad + i * stepX;
      const y = H - pad - ((p.value - min) / range) * (H - 2 * pad);
      return [x, y];
    });
    const poly = coords.map((c) => c.join(",")).join(" ");
    const dots = coords.map((c) => `<circle cx="${c[0]}" cy="${c[1]}" r="3" fill="#2f63e3"/>`).join("");
    const first = trendData[0];
    const last = trendData[trendData.length - 1];

    body = `
      <svg class="trend-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <polyline points="${poly}" fill="none" stroke="#2f63e3" stroke-width="2"/>
        ${dots}
      </svg>
      <div class="trend-labels">
        <span>${first.date} \u00b7 ${stat.format(first.value)}</span>
        <span>${last.date} \u00b7 ${stat.format(last.value)}</span>
      </div>
    `;
  }

  return `
    <div class="card">
      <h2>${lang === "en" ? "Leader trend (recent days)" : "Tendencia del l\u00edder (d\u00edas recientes)"}</h2>
      ${body}
    </div>
  `;
}

function render() {
  const tab = TABS[activeTab];
  const isNba = activeTab.startsWith("nba_");
  const stat = tab.stats[dayOfYear() % tab.stats.length];
  const sourceData = isNba ? nbaData : appData;
  const live = sourceData && sourceData[tab.dataKey] ? sourceData[tab.dataKey][stat.id] : null;
  const season = sourceData ? sourceData.season : "";

  let liveHtml;
  if (live && live.leader) {
    liveHtml = `
      <div class="live-row">
        <div>
          <div class="live-label">${lang === "en" ? "Leader" : "L\u00edder"}</div>
          <div class="live-name">${live.leader.player}</div>
        </div>
        <div class="live-value">${stat.format(live.leader.value)}</div>
      </div>
      <div class="live-row">
        <div>
          <div class="live-label">${OTHER_LABEL[lang]}</div>
          <div class="live-name">${live.coldest.player}</div>
        </div>
        <div class="live-value">${stat.format(live.coldest.value)}</div>
      </div>
      ${renderChart(stat, live)}
    `;
  } else {
    liveHtml = `<p>${lang === "en" ? "Loading today's numbers..." : "Cargando los n\u00fameros de hoy..."}</p>`;
  }

  let footerText = "";
  const curLoadState = isNba ? nbaLoadState : loadState;
  const curUpdated = sourceData ? sourceData.updated : "";
  if (curLoadState === "live") {
    footerText = (lang === "en" ? "Updated " : "Actualizado ") + curUpdated;
  } else if (curLoadState === "sample") {
    footerText = lang === "en"
      ? "Showing sample data \u2014 check your data file"
      : "Mostrando datos de muestra \u2014 revisa tu archivo de datos";
  } else {
    footerText = lang === "en" ? "Loading..." : "Cargando...";
  }

  const tabButtons = Object.keys(TABS).map((key) => {
    const cls = key === activeTab ? "tab-btn active" : "tab-btn";
    return `<button class="${cls}" data-tab="${key}">${TABS[key].label[lang]}</button>`;
  }).join("");

  document.getElementById("app").innerHTML = `
    <div class="topbar">
      <span class="eyebrow">${lang === "en" ? "Stat of the Day" : "Estad\u00edstica del D\u00eda"}</span>
      <button class="lang-toggle" id="lang-btn">${lang === "en" ? "ESPA\u00d1OL" : "ENGLISH"}</button>
    </div>

    <div class="tabs">${tabButtons}</div>

    <div class="board">
      <div class="cat">${t(stat.category)}</div>
      <h1>${t(stat.name)} \u00b7 ${stat.abbr}</h1>
      <div class="board-value">${live && live.leader ? stat.format(live.leader.value) : "\u2014"}</div>
    </div>

    <div class="card live-card">
      <h2>${lang === "en" ? `${season} season leaderboard` : `Tabla de l\u00edderes \u2014 temporada ${season}`}</h2>
      ${liveHtml}
    </div>

    ${renderTrend(stat)}

    <div class="card">
      <h2>${lang === "en" ? "What it means" : "Qu\u00e9 significa"}</h2>
      <p>${t(stat.def)}</p>
    </div>

    <div class="card">
      <h2>${lang === "en" ? "Why it matters" : "Por qu\u00e9 importa"}</h2>
      <p>${t(stat.why)}</p>
    </div>

    <div class="card">
      <h2>${lang === "en" ? "Worth knowing (limitations)" : "Hay que saber (limitaciones)"}</h2>
      <p>${t(stat.limits)}</p>
    </div>

    <div class="card">
      <h2>${lang === "en" ? "All-time benchmark" : "Referencia hist\u00f3rica"}</h2>
      <p>${t(stat.benchmark)}</p>
    </div>

    <div class="footer">${footerText}</div>
  `;

  document.getElementById("lang-btn").addEventListener("click", () => {
    lang = lang === "en" ? "es" : "en";
    render();
  });

  document.querySelectorAll(".tab-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      const newTab = btn.getAttribute("data-tab");
      if (newTab !== activeTab) {
        activeTab = newTab;
        trendData = null;
        render();
        loadTrend();
      }
    });
  });
}

async function loadTrend() {
  trendLoading = true;
  render();

  const tab = TABS[activeTab];

  try {
    const idxRes = await fetch(BASE_URL + tab.historyBase + "index.json?t=" + Date.now(), { cache: "no-store" });
    const idx = await idxRes.json();
    const dates = (idx.dates || []).slice(-7);

    const stat = tab.stats[dayOfYear() % tab.stats.length];

    const points = [];
    for (const d of dates) {
      try {
        const r = await fetch(BASE_URL + tab.historyBase + d + ".json?t=" + Date.now(), { cache: "no-store" });
        const j = await r.json();
        const v = j && j[tab.dataKey] && j[tab.dataKey][stat.id] && j[tab.dataKey][stat.id].leader
          ? j[tab.dataKey][stat.id].leader.value
          : undefined;
        if (v !== undefined) points.push({ date: d.slice(5), value: v });
      } catch (e) {
        // skip this date
      }
    }
    trendData = points;
  } catch (e) {
    trendData = [];
  }

  trendLoading = false;
  render();
}

render();
loadTrend();

fetch(DATA_URL + "?t=" + Date.now(), { cache: "no-store" })
  .then((res) => {
    if (!res.ok) throw new Error("bad response");
    return res.json();
  })
  .then((json) => {
    appData = json;
    loadState = "live";
    render();
  })
  .catch(() => {
    appData = SAMPLE_DATA;
    loadState = "sample";
    render();
  });

fetch(NBA_DATA_URL + "?t=" + Date.now(), { cache: "no-store" })
  .then((res) => {
    if (!res.ok) throw new Error("bad response");
    return res.json();
  })
  .then((json) => {
    nbaData = json;
    nbaLoadState = "live";
    render();
  })
  .catch(() => {
    nbaData = NBA_SAMPLE_DATA;
    nbaLoadState = "sample";
    render();
  });
</script>
</body>
</html>
